<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada — StaFlow</title>
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="2; url=/staflow-landing">
<link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-deep: #0F1624;
    --navy:      #1A2238;
    --teal:      #06D6A0;
    --white:     #f0f4ff;
    --white-dim: rgba(240,244,255,0.6);
    --white-muted: rgba(240,244,255,0.35);
    --border:    rgba(240,244,255,0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--navy-deep);
    color: var(--white);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(6,214,160,0.07) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(66,153,225,0.05) 0%, transparent 50%);
    pointer-events: none;
  }
  .card-404 {
    position: relative;
    max-width: 460px;
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px 32px;
    text-align: center;
  }
  .mark {
    width: 48px;
    height: 48px;
    margin: 0 auto 24px;
    display: block;
  }
  .code {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.5px;
    margin: 0 0 12px;
    line-height: 1.15;
  }
  p {
    color: var(--white-dim);
    font-size: 14px;
    line-height: 1.55;
    margin: 0 0 24px;
  }
  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border: 1px solid transparent;
    transition: all 0.2s ease;
  }
  .btn.primary {
    background: var(--teal);
    color: var(--navy-deep);
  }
  .btn.primary:hover {
    filter: brightness(1.1);
  }
  .btn.ghost {
    background: transparent;
    color: var(--white-dim);
    border-color: var(--border);
  }
  .btn.ghost:hover {
    border-color: var(--white-dim);
    color: var(--white);
  }
  .auto-redirect {
    margin-top: 18px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--white-muted);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card-404">
    <img class="mark" src="/assets/logo-mark.svg" alt="StaFlow">
    <div class="code">ERROR · 404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido. Vamos te levar de volta à página inicial.</p>
    <div class="actions">
      <a href="/staflow-landing" class="btn primary">Ir para a página inicial</a>
      <a href="/auth/login" class="btn ghost">Entrar</a>
    </div>
    <div class="auto-redirect">Redirecionando em 2 s…</div>
  </div>
</body>
</html>
