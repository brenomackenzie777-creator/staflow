<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — App do Funcionário · StaFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #090E1A;
  --bg-base:     #0D1526;
  --surface-1:   #111E35;
  --surface-2:   #162440;
  --teal:        #06D6A0;
  --teal-dim:    rgba(6,214,160,0.12);
  --teal-border: rgba(6,214,160,0.30);
  --amber:       #FFD166;
  --amber-dim:   rgba(255,209,102,0.12);
  --red:         #EF4444;
  --blue:        #4A9EFF;
  --text:        #E2EAF4;
  --text-muted:  #5A7A9A;
  --text-faint:  #2A3D55;
  --border:      rgba(226,234,244,0.07);
  --border-strong: rgba(226,234,244,0.13);
  --font-display: 'Syne', sans-serif;
  --font-body:   'DM Sans', sans-serif;
  --font-mono:   'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #060810;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* Phone frame */
.phone {
  width: 375px;
  min-height: 812px;
  background: var(--bg);
  border-radius: 44px;
  border: 1px solid rgba(226,234,244,0.10);
  box-shadow:
    0 0 0 8px #0D0F14,
    0 0 0 10px rgba(226,234,244,0.06),
    0 40px 80px rgba(0,0,0,0.6);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Notch */
.notch {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 30px;
  background: #0D0F14;
  border-radius: 0 0 18px 18px;
  z-index: 10;
}

/* Status bar */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 10px;
}
.status-bar .time-status { font-weight: 500; color: var(--text); }
.status-icons { display: flex; gap: 6px; align-items: center; }

/* App content */
.app-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 16px 20px 0;
  overflow: hidden;
}

/* Header */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.app-logo {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 16px;
  letter-spacing: -0.3px;
}
.app-logo .sta { color: var(--text); }
.app-logo .flow { color: var(--teal); }
.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--teal);
  font-weight: 500;
}

/* Greeting */
.greeting {
  margin-bottom: 4px;
}
.greeting-name {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 17px;
  color: var(--text);
}
.greeting-role {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Punch section */
.punch-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 0 20px;
}

.punch-btn {
  width: 180px; height: 180px;
  border-radius: 50%;
  background: var(--teal);
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow:
    0 0 0 12px rgba(6,214,160,0.07),
    0 0 0 24px rgba(6,214,160,0.03),
    0 20px 48px rgba(6,214,160,0.28);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
}
.punch-btn:active {
  transform: scale(0.96);
  box-shadow: 0 0 0 8px rgba(6,214,160,0.07), 0 10px 28px rgba(6,214,160,0.20);
}

/* Checkmark icon */
.punch-icon {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.punch-icon svg { width: 36px; height: 36px; }

.punch-label {
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.5px;
  color: #090E1A;
  text-align: center;
  line-height: 1.2;
}

/* Clock */
.clock {
  margin-top: 20px;
  text-align: center;
}
.clock-time {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 42px;
  letter-spacing: -2px;
  color: var(--text);
  line-height: 1;
}
.clock-date {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-top: 6px;
}

/* Status badges row */
.status-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 14px;
}
.badge {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
  font-weight: 500;
}
.badge-teal { background: var(--teal-dim); color: var(--teal); border: 1px solid var(--teal-border); }
.badge-muted { background: rgba(226,234,244,0.05); color: var(--text-muted); border: 1px solid var(--border-strong); }
.badge-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,209,102,0.25); }

/* Records section */
.records {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-top: 16px;
}
.records-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 12px;
}
.record-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.record-row:last-child { border-bottom: none; padding-bottom: 0; }
.record-time {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
}
.record-meta { font-size: 12px; color: var(--text-muted); }

/* Bottom nav */
.bottom-nav {
  display: flex;
  background: var(--bg-base);
  border-top: 1px solid var(--border);
  padding: 10px 0 20px;
  margin-top: auto;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
  cursor: pointer;
}
.nav-icon {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.nav-icon svg { width: 18px; height: 18px; }
.nav-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.nav-item.active .nav-icon svg { stroke: var(--teal); }
.nav-item.active .nav-label { color: var(--teal); }
.nav-item:not(.active) .nav-icon svg { stroke: var(--text-faint); }
.nav-item:not(.active) .nav-label { color: var(--text-faint); }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="time-status">08:47</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect x="0" y="3" width="3" height="9" rx="1" fill="#5A7A9A"/>
        <rect x="4.5" y="2" width="3" height="10" rx="1" fill="#5A7A9A"/>
        <rect x="9" y="0" width="3" height="12" rx="1" fill="#5A7A9A"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" style="color:#E2EAF4"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect x="1" y="3" width="12" height="7" rx="2" stroke="#E2EAF4" stroke-width="1.2"/>
        <rect x="13.5" y="4.5" width="2" height="3" rx="1" fill="#5A7A9A"/>
        <rect x="2" y="4" width="7" height="5" rx="1" fill="#06D6A0"/>
      </svg>
    </div>
  </div>

  <div class="app-body">
    <!-- Header -->
    <div class="app-header">
      <div class="app-logo"><span class="sta">STA</span><span class="flow">FLOW</span></div>
      <div class="avatar">JS</div>
    </div>

    <!-- Greeting -->
    <div class="greeting">
      <div class="greeting-name">João Silva</div>
      <div class="greeting-role">Porteiro · Turno Manhã</div>
    </div>

    <!-- Punch Section -->
    <div class="punch-section">
      <button class="punch-btn">
        <div class="punch-icon">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="14" stroke="#090E1A" stroke-width="1.5" stroke-opacity="0.3"/>
            <path d="M12 18.5L16.5 23L24 14" stroke="#090E1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="punch-label">REGISTRAR<br>PONTO</span>
      </button>
    </div>

    <!-- Clock -->
    <div class="clock">
      <div class="clock-time">08:47</div>
      <div class="clock-date">Quinta-feira, 11 Jun 2026</div>
    </div>

    <!-- Status badges -->
    <div class="status-row">
      <span class="badge badge-teal">Entrada 08:02</span>
      <span class="badge badge-muted">Jornada 0h45</span>
    </div>

    <!-- Recent records -->
    <div class="records">
      <div class="records-title">Últimos Registros</div>

      <div class="record-row">
        <span class="record-time">08:02</span>
        <span class="record-meta">Entrada</span>
        <span class="badge badge-teal">OK</span>
      </div>
      <div class="record-row">
        <span class="record-time">17:58</span>
        <span class="record-meta">Saída — Ontem</span>
        <span class="badge badge-muted">OK</span>
      </div>
      <div class="record-row">
        <span class="record-time">08:05</span>
        <span class="record-meta">Entrada — Ontem</span>
        <span class="badge badge-muted">OK</span>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <span class="nav-label">Ponto</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <span class="nav-label">Tarefas</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/>
        </svg>
      </div>
      <span class="nav-label">Atestado</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <span class="nav-label">Perfil</span>
    </div>
  </div>
</div>

</body>
</html>
