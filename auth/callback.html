<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmando conta — StaFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./auth.css">
</head>
<body>

<main class="auth-shell">
  <section class="auth-card" style="text-align:center;">
    <div class="brand">
      <img class="mark" src="../assets/logo-mark.svg" alt="StaFlow">
      <div class="wordmark"><span class="sta">STA</span><span class="flow">FLOW</span></div>
    </div>
    <div class="spinner" id="spinner" style="display:inline-block; width:28px; height:28px; border-width:3px; margin:8px auto 14px; border-color: rgba(255,255,255,0.15); border-top-color: var(--teal);"></div>
    <h1 class="auth-title" id="msg">Confirmando conta…</h1>
    <p class="auth-sub" id="sub">Validando seu link, aguarde um instante.</p>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script>
(async () => {
  const sb     = window.staflowSupabase;
  const params = new URLSearchParams(location.search);
  const hash   = new URLSearchParams(location.hash.replace(/^#/, ''));

  function showError(detail) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Não foi possível confirmar';
    document.getElementById('sub').innerHTML =
      (detail || 'O link pode ter expirado ou já foi usado.') +
      ' <a href="./login.html" style="color:var(--teal);">Voltar ao login</a>';
  }

  function showSuccess() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = '✓ Conta confirmada!';
    document.getElementById('sub').textContent = 'Redirecionando para o login…';
    setTimeout(() => location.replace('/auth/login.html?confirmed=1'), 1000);
  }

  // ── 1. Fluxo PKCE: URL contém ?code= ─────────────────────────────────
  // Com PKCE, o Supabase NÃO inclui ?type= na URL de redirect.
  // O tipo (signup vs recovery) só é revelado via onAuthStateChange após
  // o code exchange — por isso escutamos o evento ANTES de trocar o code.
  const code = params.get('code');
  if (code) {
    let detectedEvent = null;

    // Registra listener antes do exchange para capturar PASSWORD_RECOVERY
    const { data: { subscription } } = sb.auth.onAuthStateChange((event) => {
      detectedEvent = event;
    });

    let session = null;
    try {
      const { data, error } = await sb.auth.exchangeCodeForSession(location.href);
      if (error) throw error;
      session = data?.session;
    } catch (_) {
      // Code já foi trocado (double-click) — pega sessão existente
      session = await staflowAuth.getCurrentSession();
    }

    // Aguarda o evento propagar (onAuthStateChange é assíncrono)
    await new Promise(r => setTimeout(r, 300));
    subscription.unsubscribe();

    if (!session) {
      showError('O link expirou ou já foi utilizado.');
      return;
    }

    if (detectedEvent === 'PASSWORD_RECOVERY') {
      location.replace('./nova-senha.html');
    } else {
      showSuccess();
    }
    return;
  }

  // ── 2. Fluxo legado (implicit / token_hash em #) ──────────────────────
  const tokenHash = hash.get('access_token') || hash.get('token_hash');
  if (tokenHash) {
    await new Promise(r => setTimeout(r, 1500));
    const session = await staflowAuth.getCurrentSession();
    if (session) {
      const type = hash.get('type');
      if (type === 'recovery') {
        location.replace('./nova-senha.html');
      } else {
        showSuccess();
      }
      return;
    }
  }

  // ── 3. Erro ───────────────────────────────────────────────────────────
  showError('O link pode ter expirado ou já foi usado.');
})();
</script>
</body>
</html>
