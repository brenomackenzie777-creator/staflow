<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmando conta — StaFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./auth.css">
</head>
<body>

<main class="auth-shell">
  <section class="auth-card" style="text-align:center;">
    <div class="brand">
      <img class="mark" src="../assets/logo-mark.svg" alt="StaFlow">
      <div class="wordmark"><span class="sta">STA</span><span class="flow">FLOW</span></div>
    </div>
    <div class="spinner" id="spinner" style="display:inline-block; width:28px; height:28px; border-width:3px; margin:8px auto 14px; border-color: rgba(255,255,255,0.15); border-top-color: var(--teal);"></div>
    <h1 class="auth-title" id="msg">Confirmando conta…</h1>
    <p class="auth-sub" id="sub">Validando seu link, aguarde um instante.</p>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script>
(async () => {
  const sb     = window.staflowSupabase;
  const params = new URLSearchParams(location.search);
  const hash   = new URLSearchParams(location.hash.replace(/^#/, ''));

  // ── 1. Reset de senha (recovery) ─────────────────────────────────────
  const type = params.get('type') || hash.get('type');
  if (type === 'recovery') {
    location.replace('./nova-senha.html');
    return;
  }

  function showSuccess() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = '✓ Conta confirmada!';
    document.getElementById('sub').textContent = 'Redirecionando para o login…';
    setTimeout(() => location.replace('/auth/login.html?confirmed=1'), 1000);
  }

  function showError(detail) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Não foi possível confirmar';
    document.getElementById('sub').innerHTML =
      (detail || 'O link pode ter expirado ou já foi usado.') +
      ' <a href="./login.html" style="color:var(--teal);">Voltar ao login</a>';
  }

  // ── 2. Fluxo PKCE: URL contém ?code= ─────────────────────────────────
  const code = params.get('code');
  if (code) {
    try {
      const { data, error } = await sb.auth.exchangeCodeForSession(location.href);
      if (error) throw error;
      if (data?.session) { showSuccess(); return; }
    } catch (err) {
      // Se o code já foi trocado antes (double-click), verifica a sessão existente
      const existing = await staflowAuth.getCurrentSession();
      if (existing) { showSuccess(); return; }
      showError('O link de confirmação expirou ou já foi utilizado.');
      return;
    }
  }

  // ── 3. Fluxo legado (implicit / token_hash) ───────────────────────────
  // Aguarda o SDK processar o token na URL automaticamente
  await new Promise(r => setTimeout(r, 1500));
  const session = await staflowAuth.getCurrentSession();
  if (session) { showSuccess(); return; }

  // ── 4. Erro ───────────────────────────────────────────────────────────
  showError('O link pode ter expirado ou já foi usado.');
})();
</script>
</body>
</html>
